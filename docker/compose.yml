# Carpenter Docker Compose
#
# Quick start:
#   1. Build the image once:  docker build -t carpenter-ai/carpenter-linux:latest .
#      (from the repo root, or wherever the Dockerfile lives)
#   2. Copy this directory for your instance
#   3. Copy .env.example to .env and fill in your keys
#   4. Optionally edit config.yaml
#   5. docker compose up -d
#
# Running multiple instances in parallel:
#   Each instance needs its own directory and CARPENTER_PORT.
#   Volumes are automatically scoped per Compose project (directory name).
#
#   docker build -t carpenter-ai/carpenter-linux:latest .    # build once from repo root
#   mkdir ~/carpenter-a ~/carpenter-b
#   for d in ~/carpenter-a ~/carpenter-b; do cp docker/{compose.yml,config.yaml,.env.example} "$d/"; done
#   cd ~/carpenter-a && cp .env.example .env && $EDITOR .env   # set CARPENTER_PORT=7843
#   cd ~/carpenter-b && cp .env.example .env && $EDITOR .env   # set CARPENTER_PORT=7844
#   cd ~/carpenter-a && docker compose up -d
#   cd ~/carpenter-b && docker compose up -d
#
# Data is stored in named volumes scoped to this Compose project.
# To back up: docker compose cp app:/carpenter/data ./backup/

services:
  app:
    image: carpenter-ai/carpenter-linux:latest
    # To build from source instead, uncomment and run from the repo directory:
    # build:
    #   context: ..
    #   dockerfile: Dockerfile
    ports:
      - "${CARPENTER_PORT:-7843}:7842"
    volumes:
      - carpenter-docker-data:/carpenter/data
      - carpenter-docker-kb:/carpenter/config/kb
      - ./config.yaml:/carpenter/config/config.yaml:ro
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - UI_TOKEN=${UI_TOKEN}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.socket(); s.settimeout(5); s.connect(('localhost',7842)); s.close()"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  carpenter-docker-data:
  carpenter-docker-kb:
