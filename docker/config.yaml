# Carpenter Docker configuration
#
# PARITY NOTE: This file must be kept in sync with the bare-metal config
# generated by install.sh and with carpenter-core's config.py DEFAULTS.
# When adding or changing keys, update all three locations.
#
# This is a production-ready config for running Carpenter in a Docker container.
# Credentials (ANTHROPIC_API_KEY, UI_TOKEN) are passed via environment
# variables in compose.yml, NOT this file.
#
# Configuration precedence (highest last):
#   built-in defaults < this file < {base_dir}/.env < environment variables
#
# Available models (for model_roles and coding_agents):
#   claude-haiku-4-5-20251001    (fast, cheap)
#   claude-sonnet-4-5-20250929   (balanced)
#   claude-opus-4-6              (most capable)

# ─── Directory layout ────────────────────────────────────────────────
# All paths use /carpenter prefix (the Docker WORKDIR).
# /carpenter/data is a volume mount for persistence.
base_dir: /carpenter
database_path: /carpenter/data/platform.db
log_dir: /carpenter/data/logs
code_dir: /carpenter/data/code
workspaces_dir: /carpenter/data/workspaces
templates_dir: /carpenter/config/templates
tools_dir: /carpenter/config/tools
data_models_dir: /carpenter/data_models
prompts_dir: ""  # empty = {base_dir}/config/prompts

# ─── Server ──────────────────────────────────────────────────────────
# Bind 0.0.0.0 inside the container; expose via compose.yml port mapping.
host: "0.0.0.0"
port: 7842
# allow_insecure_bind must be true when host is 0.0.0.0 and no TLS is configured.
# The container port is not directly reachable from outside unless you map it.
allow_insecure_bind: true
shutdown_timeout: 25

# ui_token is a SECRET -- do NOT set it here.
# Pass UI_TOKEN as an environment variable in compose.yml instead.

# ─── TLS/SSL ─────────────────────────────────────────────────────────
# Enable for HTTPS. Mount cert files into the container.
tls_enabled: false
tls_cert_path: ""
tls_key_path: ""
tls_domain: ""
tls_ca_path: ""

# ─── AI provider ─────────────────────────────────────────────────────
ai_provider: anthropic

# Model role assignments -- all model references go through these slots.
# Format: "provider:model" or just "model" (uses ai_provider).
# Empty string ("") falls back to the "default" slot.
model_roles:
  default: claude-haiku-4-5-20251001
  chat: anthropic:claude-haiku-4-5-20251001
  default_step: claude-haiku-4-5-20251001
  title: claude-haiku-4-5-20251001
  summary: claude-haiku-4-5-20251001
  compaction: claude-haiku-4-5-20251001
  code_review: claude-haiku-4-5-20251001
  review_judge: claude-haiku-4-5-20251001
  reflection_daily: claude-haiku-4-5-20251001
  reflection_weekly: ""
  reflection_monthly: ""

# Named model definitions (referenced by model registry and scoring selector)
models:
  opus:
    provider: anthropic
    model_id: claude-opus-4-6
    description: "Most capable model. Deep reasoning, architecture decisions, security review."
    cost_tier: high
    context_window: 200000
    roles: [planning, review, implementation]
  sonnet:
    provider: anthropic
    model_id: claude-sonnet-4-5-20250929
    description: "Balanced capability and cost. Standard implementation, code review."
    cost_tier: medium
    context_window: 200000
    roles: [planning, review, implementation, documentation]
  haiku:
    provider: anthropic
    model_id: claude-haiku-4-5-20251001
    description: "Fast and cheap. Summarization, simple code generation, formatting."
    cost_tier: low
    context_window: 200000
    roles: [summarization, documentation]

# Context windows -- token limits per provider for compaction and prompt sizing
context_windows:
  local: 16384
  ollama: 16384
  tinfoil: 8192
  anthropic: 200000
  chain: 16384

# Ollama settings (used when ai_provider: ollama)
ollama_url: "http://localhost:11434"
ollama_model: "llama3.1"

# Tinfoil settings (used when ai_provider: tinfoil)
tinfoil_model: "llama3-3-70b"
tinfoil_max_tokens: 4096

# ─── Sandbox ─────────────────────────────────────────────────────────
# Inside a container, sandbox adds defense-in-depth.
# "auto" detects the best available method at startup.
sandbox:
  method: auto
  allowed_write_dirs: []  # empty = compute from config paths
  on_failure: open        # open = fallback unsandboxed, closed = refuse

# ─── Encryption ──────────────────────────────────────────────────────
encryption:
  enforce: true  # Require cryptography library for tainted arcs

# ─── Security allowlists ─────────────────────────────────────────────
# Empty lists = no restrictions (default). Populate to restrict.
security:
  email_allowlist: []
  domain_allowlist: []
  url_allowlist: []
  filepath_allowlist: []
  command_allowlist: []

# ─── Compaction & context management ─────────────────────────────────
compaction_threshold: 0.8
compaction_threshold_tokens: 0
compaction_preserve_recent: 8
context_compaction_hours: 6

# ─── Workspace & arc lifecycle ───────────────────────────────────────
workspace_retention_days: 14
workspace_retention_count: 100
arc_archive_days: 7

# ─── Execution tuning ───────────────────────────────────────────────
mechanical_retry_max: 4
agentic_iteration_budget: 10
agentic_iteration_cap: 256
heartbeat_seconds: 5
max_concurrent_handlers: 2
execution_session_expiry_hours: 1

# ─── Thread pools ────────────────────────────────────────────────────
default_thread_pool_size: 16
work_handler_thread_pool_size: 3

# ─── Rate limiting ───────────────────────────────────────────────────
rate_limit_rpm: 45
rate_limit_itpm: 35000
rate_limit_429_fill_fraction: 0.75

# ─── Retry & circuit breaker ────────────────────────────────────────
retry_max_attempts: 3
retry_base_delay: 1.0
circuit_breaker_threshold: 5
circuit_breaker_recovery_seconds: 60

# ─── Arc retry system ───────────────────────────────────────────────
arc_retry:
  enabled: true
  default_policy: transient_only  # transient_only | aggressive | conservative
  max_retries:
    RateLimitError: 5
    APIOutageError: 4
    NetworkError: 3
    UnknownError: 2
    VerificationError: 2
    default: 3
  backoff_caps:
    RateLimitError: 600
    APIOutageError: 300
    NetworkError: 60
    VerificationError: 0
    default: 120
  backoff_base: 2
  jitter_percent: 10
  escalate_on_exhaust:
    RateLimitError: false
    APIOutageError: true
    ModelError: true
    VerificationError: false
    default: false

# ─── Local fallback (optional) ───────────────────────────────────────
local_fallback:
  enabled: false
  provider: ollama
  url: ""
  model: "qwen3.5:9b"
  context_window: 16384
  timeout: 300
  max_tokens: 4096
  allowed_operations: [chat, summarization, simple_code]
  blocked_operations: [review, security_review, planning]

# ─── Knowledge base ─────────────────────────────────────────────────
kb:
  enabled: true
  dir: ""  # empty = {base_dir}/kb
  max_entry_bytes: 6000
  staleness_days: 30
  search_backend: fts5
  embedding_url: ""
  embedding_model: "nomic-embed-text"
  embedding_dim: 768
  work_history_enabled: true

# ─── Memory ──────────────────────────────────────────────────────────
memory_recent_hints: 3
chat_language: ""  # ISO 639-1 code; empty = respond in user's language

# ─── Reflection ──────────────────────────────────────────────────────
reflection:
  enabled: false
  min_daily_conversations: 1
  daily_cron: "0 23 * * *"
  weekly_cron: "0 23 * * 0"
  monthly_cron: "0 23 1 * *"
  auto_action: false
  review_mode: auto
  tainted_review_mode: human
  max_actions_per_reflection: 10
  max_actions_per_day: 50

# ─── Review pipeline ────────────────────────────────────────────────
review:
  adversarial_mode: false
  adversarial_min_findings: 1

verification:
  enabled: true
  threshold: 150

# ─── Agent roles (behavioural config for LM invocations) ────────────
agent_roles:
  security-reviewer:
    system_prompt: >
      You are a security reviewer for agent-generated code. Analyze for injection
      vulnerabilities, unsafe operations, privilege escalation, and exfiltration risks.
    auto_review_output_types: [python, shell]
    temperature: 0.2
  ux-reviewer:
    system_prompt: >
      You are a UX/safety reviewer. Ensure outputs are appropriate, helpful,
      and safe for end users.
    auto_review_output_types: [text, json]
  judge:
    system_prompt: >
      You are the final judge in a multi-reviewer process. Synthesize reviewer
      verdicts and render final approval or rejection.
    auto_review_output_types: []
    temperature: 0.1

# ─── Coding agents ──────────────────────────────────────────────────
default_coding_agent: builtin
coding_agents:
  builtin:
    type: builtin
    model: claude-haiku-4-5-20251001
    max_tokens: 4096
    max_iterations: 20
    timeout: 300

# ─── Tool output limits ─────────────────────────────────────────────
tool_output_max_bytes: 32768
tool_output_head_lines: 50
tool_output_tail_lines: 20

# ─── Connectors & plugins ───────────────────────────────────────────
connectors: {}
connector_retention_days: 7
plugin_shared_base: ""
plugins_config: ""
plugin_retention_days: 7
model_registry_path: ""

# ─── Notifications ───────────────────────────────────────────────────
notifications:
  email:
    enabled: false
    mode: smtp
    smtp_host: ""
    smtp_port: 587
    smtp_from: ""
    smtp_to: ""
    smtp_username: ""
    smtp_password: ""
    smtp_tls: true
    command: ""
  batch_window: 60
  routing:
    reflection_actions: low
    review_needed: normal
    security_events: urgent
